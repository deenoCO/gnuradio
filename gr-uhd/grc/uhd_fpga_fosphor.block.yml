id: uhd_fpga_f15
label: RFNoC F15 (FPGA Fosphor)

parameters:
-   id: type
    label: RFNoC Block Type
    dtype: string
    default: 'block'
    hide: all
-   id: desc
    label: Block Descriptor
    dtype: string
    default: 'fosphor.yml'
    hide: all

inputs:
-   domain: rfnoc.clk
    id: ce_clk
    dtype: message
-   domain: rfnoc.data
    id: fft_in
    dtype: fc32

outputs:
-   domain: rfnoc.data
    id: hist
    dtype: fc32
-   domain: rfnoc.data
    id: wf
    dtype: fc32

documentation: |-
  RFNoC F15 (fosphor) (FPGA Implementation).
  This block generates histogram and waterfall data for the Fosphor display.
  It must be connected to an FFT block on its input.

file_format: 1
